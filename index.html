<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T . R . O . R - Financial Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- صفحه ورود (Splash Screen) - انگلیسی -->
    <div id="splash-screen">
        <div class="glass-card welcome-card">
            <h1 class="neon-text-upper">Welcome to</h1>
            <h2 class="white-text-lower">Mr. Alavi's Financial Project</h2>
        </div>
    </div>

    <!-- محتوای اصلی سایت -->
    <div id="main-content" class="hidden">
        <header>
            <h1>T . R . O . R</h1>
        </header>

        <main>
            <!-- داشبورد اصلی -->
            <div id="dashboard-view">
                <!-- پنل مدیریت -->
                <section class="panel admin-panel glass-card">
                    <h2>پنل مدیریت</h2>
                    <div class="panel-btns">
                        <button class="glass-btn" onclick="openSettings()">⚙ تنظیمات مالی و بودجه</button>
                        <button class="glass-btn" onclick="backupData()">💾 پشتیبان‌گیری داده‌ها</button>
                    </div>
                </section>

                <!-- پنل کاربردی (۱۳ بخش) -->
                <section class="panel functional-panel glass-card">
                    <h2>پنل کاربردی (۱۳ بخش مالی)</h2>
                    <div class="grid-13">
                        <button class="glass-btn" onclick="openSection(1, 'فروردین')">1. فروردین 📅</button>
                        <button class="glass-btn" onclick="openSection(2, 'اردیبهشت')">2. اردیبهشت 📅</button>
                        <button class="glass-btn" onclick="openSection(3, 'خرداد')">3. خرداد 📅</button>
                        <button class="glass-btn" onclick="openSection(4, 'تیر')">4. تیر 📅</button>
                        <button class="glass-btn" onclick="openSection(5, 'مرداد')">5. مرداد 📅</button>
                        <button class="glass-btn" onclick="openSection(6, 'شهریور')">6. شهریور 📅</button>
                        <button class="glass-btn" onclick="openSection(7, 'مهر')">7. مهر 📅</button>
                        <button class="glass-btn" onclick="openSection(8, 'آبان')">8. آبان 📅</button>
                        <button class="glass-btn" onclick="openSection(9, 'آذر')">9. آذر 📅</button>
                        <button class="glass-btn" onclick="openSection(10, 'دی')">10. دی 📅</button>
                        <button class="glass-btn" onclick="openSection(11, 'بهمن')">11. بهمن 📅</button>
                        <button class="glass-btn" onclick="openSection(12, 'اسفند')">12. اسفند 📅</button>
                        <button class="glass-btn special-btn" onclick="openSection(13, 'گزارش ماشین و صندوق‌ها')">13. ماشین و صندوق‌ها 🚗</button>
                    </div>
                </section>
            </div>

            <!-- نمای داخلی هر بخش -->
            <div id="section-view" class="hidden glass-card">
                <div class="section-header">
                    <button class="glass-btn back-btn" onclick="backToDashboard()">← بازگشت به منوی اصلی</button>
                    <h2 id="section-title">عنوان بخش</h2>
                </div>
                
                <div class="form-container">
                    <h3>ثبت تراکنش جدید</h3>
                    <form id="transaction-form" onsubmit="saveTransaction(event)">
                        <div class="form-group">
                            <label>مبلغ (تومان):</label>
                            <input type="number" id="tx-amount" required placeholder="مثال: 500000">
                        </div>
                        <div class="form-group">
                            <label>نوع تراکنش:</label>
                            <select id="tx-type">
                                <option value="هزینه">هزینه</option>
                                <option value="درآمد">درآمد</option>
                                <option value="متفرقه">متفرقه</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>دسته‌بندی:</label>
                            <select id="tx-category">
                                <option value="خوراک">🍕 خوراک</option>
                                <option value="ماشین">🚗 ماشین</option>
                                <option value="تعمیرات تیبا">🛠 تعمیرات تیبا</option>
                                <option value="سوخت">⛽ سوخت</option>
                                <option value="قبض">🧾 قبض</option>
                                <option value="خرید">🛍 خرید</option>
                                <option value="کار">💼 کار</option>
                                <option value="متفرقه">📌 متفرقه</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>توضیحات:</label>
                            <input type="text" id="tx-desc" placeholder="توضیحات تراکنش...">
                        </div>
                        <button type="submit" class="glass-btn submit-btn">ثبت و ذخیره</button>
                    </form>
                </div>

                <div class="records-container">
                    <h3>تراکنش‌های ثبت شده در این بخش</h3>
                    <div id="records-list">
                        <!-- لیست تراکنش‌ها -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
