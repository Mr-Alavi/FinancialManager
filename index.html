<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم عامل مالی شخصی TROR (PFOS)</title>
    
    <!-- PWA Manifest with Cache Busting -->
    <link rel="manifest" href="manifest.json?v=8">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TROR PFOS">

    <!-- Stylesheet with Cache Busting -->
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <!-- Splash / Loading Screen -->
        <div id="splash-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0d1117;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;color:#58a6ff;font-family:Tahoma,sans-serif;">
            <div class="spinner" style="width:50px;height:50px;border:3px solid rgba(88,166,255,0.3);border-radius:50%;border-top-color:#58a6ff;animation:spin 1s ease-in-out infinite;"></div>
            <h2 style="margin-top:20px;font-size:18px;letter-spacing:1px;">T . R . O . R | PFOS v3.0</h2>
        </div>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Main Application Script with Cache Busting -->
    <script src="app.js?v=8"></script>
</body>
</html>
