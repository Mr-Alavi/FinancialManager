<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.R.O.R Finance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="dashboard-page" class="page">
            <h1 style="text-align: left;">T.R.O.R</h1>
            <div class="dashboard-card">
                <p>موجودی کل</p>
                <div id="total-balance" class="balance">۰ تومان</div>
            </div>
            
            <div class="glass-card">
                <input type="number" id="amount" placeholder="مبلغ (تومان)">
                <select id="category">
                    <option value="income">درآمد</option>
                    <option value="food">غذا</option>
                    <option value="car">خودرو (تیبا ۱)</option>
                </select>
                <button class="btn-primary" onclick="saveTransaction()">ثبت تراکنش</button>
            </div>
        </div>

        <div id="vehicle-page" class="page">
            <h2 style="text-align: left;">خودرو تیبا ۱</h2>
            <div class="dashboard-card">
                <p>هزینه کل نگهداری</p>
                <div id="vehicle-total" class="balance">۰ تومان</div>
            </div>
        </div>

        <nav class="bottom-nav">
            <button onclick="switchPage('dashboard')">داشبورد</button>
            <button onclick="switchPage('vehicle')">خودرو</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
