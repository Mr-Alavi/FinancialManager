<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financial Manager</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<h1>سلام حسین 👋</h1>

<p>مدیریت هوشمند زندگی و مالی</p>

</header>



<section class="dashboard">


<div class="card main">

<span>💰 موجودی</span>

<h2 id="balance">0 تومان</h2>

</div>



<div class="card income">

<span>📥 درآمد</span>

<h2 id="income">0 تومان</h2>

</div>



<div class="card expense">

<span>📤 هزینه</span>

<h2 id="expense">0 تومان</h2>

</div>



<div class="card">

<span>💳 بدهی</span>

<h2 id="debt">0 تومان</h2>

</div>



<div class="card">

<span>🎯 هدف‌ها</span>

<h2 id="goal">0 تومان</h2>

</div>


</section>





<section class="actions">


<button onclick="addTransaction()">
➕ ثبت تراکنش
</button>


<button onclick="showTransactions()">
📋 تاریخچه
</button>


<button onclick="addDebt()">
💳 بدهی جدید
</button>


<button onclick="addGoal()">
🎯 هدف جدید
</button>


</section>





<section class="list">


<h3>آخرین تراکنش‌ها</h3>


<div id="transactions">

</div>


</section>



</div>



<script src="app.js"></script>


</body>

</html>
