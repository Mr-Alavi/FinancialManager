<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Financial Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <header>
            <h1>سلام حسین 👋</h1>
            <p>مدیریت هوشمند زندگی و مالی</p>
        </header>


        <section class="cards">

            <div class="card">
                <span>💰 موجودی</span>
                <h2 id="balance">0 تومان</h2>
            </div>


            <div class="card income">
                <span>📥 درآمد</span>
                <h2 id="income">0 تومان</h2>
            </div>


            <div class="card expense">
                <span>📤 خرج</span>
                <h2 id="expense">0 تومان</h2>
            </div>


            <div class="card">
                <span>💳 بدهی</span>
                <h2>0 تومان</h2>
            </div>


            <div class="card">
                <span>🎯 هدف‌ها</span>
                <h2>0 تومان</h2>
            </div>

        </section>


        <button class="main-btn">
            ➕ ثبت تراکنش
        </button>


    </div>


<script src="app.js"></script>

</body>
      </html>
