<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T . R . O . R - Financial Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- صفحه ورود (Splash Screen) -->
    <div id="splash-screen">
        <div class="glass-card welcome-card">
            <h1 class="neon-text-upper">Welcome to</h1>
            <h2 class="white-text-lower">Mr. Alavi's Financial Project</h2>
        </div>
    </div>

    <!-- محتوای اصلی سایت -->
    <div id="main-content" class="hidden">
        <header>
            <h1>T . R . O . R</h1>
        </header>

        <main>
            <!-- داشبورد اصلی -->
            <div id="dashboard-view">
                <!-- پنل مدیریت -->
                <section class="panel admin-panel glass-card">
                    <h2>پنل مدیریت</h2>
                    <div class="panel-btns">
                        <button class="glass-btn" onclick="openSection(12, 'تنظیمات')">⚙ تنظیمات سیستم</button>
                        <button class="glass-btn" onclick="backupData()">💾 پشتیبان‌گیری داده‌ها</button>
                    </div>
                </section>

                <!-- پنل کاربردی (۱۳ بخش اصلی با عملکرد اختصاصی) -->
                <section class="panel functional-panel glass-card">
                    <h2>پنل کاربردی (۱۳ بخش مالی)</h2>
                    <div class="grid-13">
                        <button class="glass-btn" onclick="openSection(1, 'خلاصه مالی')">1. خلاصه مالی 📊</button>
                        <button class="glass-btn" onclick="openSection(2, 'ثبت')">2. ثبت 📝</button>
                        <button class="glass-btn" onclick="openSection(3, 'بودجه روزانه')">3. بودجه روزانه 💵</button>
                        <button class="glass-btn" onclick="openSection(4, 'دسته‌بندی')">4. دسته‌بندی 🗂️</button>
                        <button class="glass-btn" onclick="openSection(5, 'دسته بندی هزینه')">5. دسته بندی هزینه 🏷️</button>
                        <button class="glass-btn" onclick="openSection(6, 'تحلیل هزینه')">6. تحلیل هزینه 📈</button>
                        <button class="glass-btn" onclick="openSection(7, 'صندوق‌های پس‌انداز')">7. صندوق‌های پس‌انداز 💰</button>
                        <button class="glass-btn" onclick="openSection(8, 'داشبورد')">8. داشبورد 📊</button>
                        <button class="glass-btn" onclick="openSection(9, 'گزارش ماهانه')">9. گزارش ماهانه 📑</button>
                        <button class="glass-btn" onclick="openSection(10, 'اهداف')">10. اهداف 🎯</button>
                        <button class="glass-btn" onclick="openSection(11, 'حساب‌ها')">11. حساب‌ها 💳</button>
                        <button class="glass-btn" onclick="openSection(12, 'تنظیمات')">12. تنظیمات ⚙️</button>
                        <button class="glass-btn special-btn" onclick="openSection(13, 'شاهین')">13. شاهین 🚗</button>
                    </div>
                </section>
            </div>

            <!-- نمای داخلی داینامیک مختص هر بخش -->
            <div id="section-view" class="hidden glass-card">
                <div class="section-header">
                    <button class="glass-btn back-btn" onclick="backToDashboard()">← بازگشت به منوی اصلی</button>
                    <h2 id="section-title">عنوان بخش</h2>
                </div>
                
                <!-- محتوای متناسب با هر بخش به صورت پویا اینجا بارگذاری می‌شود -->
                <div id="section-dynamic-content">
                    <!-- محتوا بر اساس انتخاب کاربر تغییر می‌کند -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
